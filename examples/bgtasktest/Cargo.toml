[package]
name    = "rust-bgtasktest"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi-ohos                              = { workspace = true }
napi-derive-ohos                       = { workspace = true }
ohos-transient-task-binding            = { workspace = true, features = ["api-20"] }
ohos-background-process-manager-binding = { workspace = true, features = ["api-17"] }
ohos-hilog-binding                     = { workspace = true, features = ["redirect", "log"] }

[build-dependencies]
napi-build-ohos = { workspace = true }

[profile.release]
lto = true
