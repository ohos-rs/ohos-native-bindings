[package]
name    = "rust-abilitytest"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi-ohos                  = { workspace = true }
napi-derive-ohos           = { workspace = true }
ohos-ability-base-binding  = { workspace = true, features = ["api-17"] }
ohos-child-process-binding = { workspace = true, features = ["api-20"] }
ohos-hilog-binding         = { workspace = true, features = ["redirect", "log"] }

[build-dependencies]
napi-build-ohos = { workspace = true }

[profile.release]
lto = true
