[package]
name    = "rust-cryptotest"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi-ohos          = { workspace = true }
napi-derive-ohos   = { workspace = true }
ohos-crypto-binding    = { workspace = true }
ohos-hilog-binding = { workspace = true, features = ["redirect", "log"] }

[build-dependencies]
napi-build-ohos = { workspace = true }

[profile.release]
lto = true
