[package]
name        = "ohos-pasteboard-binding"
version     = "0.0.4"
edition     = "2021"
license     = "MIT OR Apache-2.0"
description = "OpenHarmony's pasteboard binding for rust"

[lints]
workspace = true

[features]
default = []
api-13  = ["ohos-native-pasteboard-sys/api-13", "ohos-udmf-binding/api-13"]
api-14  = ["api-13", "ohos-native-pasteboard-sys/api-14", "ohos-udmf-binding/api-14"]
api-15  = ["api-14", "ohos-native-pasteboard-sys/api-15", "ohos-udmf-binding/api-15"]
api-16  = ["api-15", "ohos-native-pasteboard-sys/api-16", "ohos-udmf-binding/api-16"]
api-17  = ["api-16", "ohos-native-pasteboard-sys/api-17", "ohos-udmf-binding/api-17"]
api-18  = ["api-17", "ohos-native-pasteboard-sys/api-18", "ohos-udmf-binding/api-18"]
api-19  = ["api-18", "ohos-native-pasteboard-sys/api-19", "ohos-udmf-binding/api-19"]
api-20  = ["api-19", "ohos-native-pasteboard-sys/api-20", "ohos-udmf-binding/api-20"]
api-21  = ["api-20", "ohos-native-pasteboard-sys/api-21", "ohos-udmf-binding/api-21"]
api-22  = ["api-21", "ohos-native-pasteboard-sys/api-22", "ohos-udmf-binding/api-22"]
api-23  = ["api-22", "ohos-native-pasteboard-sys/api-23", "ohos-udmf-binding/api-23"]
api-24  = ["api-23", "ohos-native-pasteboard-sys/api-24", "ohos-udmf-binding/api-24"]

[dependencies]
ohos-native-pasteboard-sys = { workspace = true }
ohos-udmf-binding          = { workspace = true }
