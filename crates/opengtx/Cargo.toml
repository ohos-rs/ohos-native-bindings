[package]
name        = "hms-opengtx-binding"
version     = "0.1.1"
edition     = "2021"
license     = "MIT OR Apache-2.0"
description = "HarmonyOS OpenGTX binding for rust"

[dependencies]
hms-opengtx-sys  = { workspace = true }
ohos-enum-derive = { workspace = true }

[features]
default = []
api-13  = ["hms-opengtx-sys/api-13"]
api-14  = ["api-13", "hms-opengtx-sys/api-14"]
api-15  = ["api-14", "hms-opengtx-sys/api-15"]
api-16  = ["api-15", "hms-opengtx-sys/api-16"]
api-17  = ["api-16", "hms-opengtx-sys/api-17"]
api-18  = ["api-17", "hms-opengtx-sys/api-18"]
api-19  = ["api-18", "hms-opengtx-sys/api-19"]
api-20  = ["api-19", "hms-opengtx-sys/api-20"]
api-21  = ["api-20", "hms-opengtx-sys/api-21"]
api-22  = ["api-21", "hms-opengtx-sys/api-22"]
api-23  = ["api-22", "hms-opengtx-sys/api-23"]

[lints]
workspace = true
